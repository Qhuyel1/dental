{% extends "base.html" %}

{% block title %}Xóa dịch vụ{% endblock %}
{% block page_title %}Xóa dịch vụ{% endblock %}

{% block content %}
    <form class="panel" method="post">
        {% csrf_token %}
        <div class="panel-body">
            <div class="danger-zone">
                <p>Bạn đang xóa dịch vụ <strong>{{ object.name }}</strong> ({{ object.code }}).</p>
            </div>
            <div class="actions" style="margin-top: 18px;">
                <button class="danger icon-button icon-delete" type="submit" title="Xóa" aria-label="Xóa"><span class="sr-only">Xóa</span></button>
                <a class="button secondary" href="{% url 'clinic:service-list' %}">Hủy</a>
            </div>
        </div>
    </form>
{% endblock %}
