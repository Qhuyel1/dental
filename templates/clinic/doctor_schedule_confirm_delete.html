{% extends "base.html" %}

{% block title %}Xóa lịch trực{% endblock %}
{% block page_title %}Xóa lịch trực bác sĩ{% endblock %}

{% block content %}
    <form class="panel" method="post">
        {% csrf_token %}
        <div class="panel-body">
            <div class="danger-zone">
                <p>Bạn đang xóa lịch trực của <strong>{{ object.doctor.full_name }}</strong> ngày {{ object.work_date|date:"d/m/Y" }}.</p>
            </div>
            <div class="actions" style="margin-top: 18px;">
                <button class="danger icon-button icon-delete" type="submit" title="Xóa" aria-label="Xóa"><span class="sr-only">Xóa</span></button>
                <a class="button secondary" href="{% url 'clinic:doctor-schedule-list' %}">Hủy</a>
            </div>
        </div>
    </form>
{% endblock %}
