{% extends "base.html" %}

{% block title %}Xóa hóa đơn{% endblock %}
{% block page_title %}Xóa hóa đơn{% endblock %}

{% block content %}
    <form class="panel" method="post">
        {% csrf_token %}
        <div class="panel-body">
            <div class="danger-zone">
                <p>Bạn đang xóa hóa đơn <strong>{{ object.invoice_code }}</strong> của {{ object.patient.full_name }}.</p>
            </div>
            <div class="actions" style="margin-top: 18px;">
                <button class="danger icon-button icon-delete" type="submit" title="Xóa" aria-label="Xóa"><span class="sr-only">Xóa</span></button>
                <a class="button secondary" href="{% url 'clinic:invoice-detail' object.pk %}">Hủy</a>
            </div>
        </div>
    </form>
{% endblock %}
