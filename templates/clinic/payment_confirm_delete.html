{% extends "base.html" %}

{% block title %}Xóa thanh toán{% endblock %}
{% block page_title %}Xóa thanh toán{% endblock %}

{% block content %}
    <form class="panel" method="post">
        {% csrf_token %}
        <div class="panel-body">
            <div class="danger-zone">
                <p>Bạn đang xóa khoản thanh toán <strong>{{ object.amount|floatformat:0 }} VND</strong> của hóa đơn {{ object.invoice.invoice_code }}.</p>
            </div>
            <div class="actions" style="margin-top: 18px;">
                <button class="danger icon-button icon-delete" type="submit" title="Xóa" aria-label="Xóa"><span class="sr-only">Xóa</span></button>
                <a class="button secondary" href="{% url 'clinic:invoice-detail' object.invoice.pk %}">Hủy</a>
            </div>
        </div>
    </form>
{% endblock %}
