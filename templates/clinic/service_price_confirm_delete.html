{% extends "base.html" %}

{% block title %}Xóa giá dịch vụ{% endblock %}
{% block page_title %}Xóa giá dịch vụ{% endblock %}

{% block content %}
    <form class="panel" method="post">
        {% csrf_token %}
        <div class="panel-body">
            <div class="danger-zone">
                <p>Bạn đang xóa giá của dịch vụ <strong>{{ object.service.name }}</strong> trong bảng giá <strong>{{ object.price_list.name }}</strong>.</p>
            </div>
            <div class="actions" style="margin-top: 18px;">
                <button class="danger icon-button icon-delete" type="submit" title="Xóa" aria-label="Xóa"><span class="sr-only">Xóa</span></button>
                <a class="button secondary" href="{% url 'clinic:price-list-detail' object.price_list.pk %}">Hủy</a>
            </div>
        </div>
    </form>
{% endblock %}
